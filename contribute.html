<h2>欢迎投稿你的毕业寄语！</h2>
<p>审核通过后会显示在留言墙（匿名可选）</p>

<form name="grad-message" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
  <!-- 隐藏字段，防机器人，必加 -->
  <input type="hidden" name="form-name" value="grad-message" />

  <p>
    <label>届别（如 2025届）：<input type="text" name="届别" required /></label>
  </p>
  <p>
    <label>姓名 / 匿名：<input type="text" name="姓名" required /></label>
  </p>
  <p>
    <label>专业：<input type="text" name="专业" /></label>
  </p>
  <p>
    <label>留言内容：<textarea name="留言" rows="6" required></textarea></label>
  </p>
  <p>
    <label>联系方式（可选，用于回复）：<input type="email" name="email" /></label>
  </p>
  <!-- 防spam honeypot：机器人会填，人类不会 -->
  <p hidden>
    <label>别填这里：<input name="bot-field" /></label>
  </p>
  <button type="submit">提交寄语</button>
</form>

<!-- 提交成功后显示感谢页（可选，自定义） -->
<div data-netlify-recaptcha="true"></div> <!-- 如果想加 reCAPTCHA 防spam -->

<!-- 成功提示（JS 可选） -->
<script>
  if (window.location.search.includes('success=true')) {
    alert('投稿成功！我们会尽快审核～');
  }
</script>
